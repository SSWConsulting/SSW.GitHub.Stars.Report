name: Star report

on:
  schedule:
    # GitHub cron is UTC only, so these are converted to land at 10:00 in Sydney
    # on 1 Jan / 1 Apr / 1 Jul / 1 Oct (Jan & Apr are AEDT +11, Jul & Oct AEST +10).
    - cron: "0 0 1 7,10 *" # 10:00 AEST on 1 Jul & 1 Oct
    - cron: "0 23 31 3 *" # 10:00 AEDT on 1 Apr (fires 31 Mar 23:00 UTC)
    - cron: "0 23 31 12 *" # 10:00 AEDT on 1 Jan (fires 31 Dec 23:00 UTC)
  workflow_dispatch: {} # allow manual runs to test

permissions:
  contents: write # commit the updated history file

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    env:
      TZ: Australia/Sydney # so the recorded checkpoint date is the Sydney calendar day
    steps:
      - uses: actions/checkout@v4

      - name: Record star checkpoint
        id: report
        env:
          # ORG_READ_TOKEN = a PAT with read access to the private SSW repos
          # (YakShaver, EagleEye). Falls back to GITHUB_TOKEN for public repos.
          # The repo list lives in stars-history.json, grouped by org.
          GH_TOKEN: ${{ secrets.ORG_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: python .github/scripts/star_report.py

      - name: Commit updated history
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add public/stars-history.json
          git commit -m "Star checkpoint ${{ steps.report.outputs.date }}" || echo "no change"
          git push

      - name: Notify Microsoft Teams
        env:
          # Create in Teams: channel ••• → Workflows → "Post to a channel when a
          # webhook request is received" → paste the generated URL as this secret.
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          DATE: ${{ steps.report.outputs.date }}
          REPORT_URL: "https://sswconsulting.github.io/${{ github.event.repository.name }}/"
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL not set — skipping notification."; exit 0
          fi
          PRETTY=$(date -d "$DATE" +"%d %b %Y") # ISO -> DD MMM YYYY (e.g. 08 Jul 2026)
          jq -n --arg date "$PRETTY" --arg url "$REPORT_URL" '{
            type: "message",
            attachments: [{
              contentType: "application/vnd.microsoft.card.adaptive",
              content: {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                type: "AdaptiveCard",
                version: "1.4",
                body: [
                  { type: "TextBlock", size: "Large", weight: "Bolder", text: "📊 GitHub Stars Report" },
                  { type: "TextBlock", wrap: true, text: ("Quarterly checkpoint saved on **" + $date + "**.") },
                  { type: "TextBlock", wrap: true, text: "cc <at>Adam Cogan</at> <at>Tiago Araujo</at> <at>Calum Simpson</at>" }
                ],
                actions: [
                  { type: "Action.OpenUrl", title: "View the full report →", url: $url }
                ],
                msteams: {
                  entities: [
                    { type: "mention", text: "<at>Adam Cogan</at>",    mentioned: { id: "adam@ssw.com.au",  name: "Adam Cogan" } },
                    { type: "mention", text: "<at>Tiago Araujo</at>",   mentioned: { id: "tiago@ssw.com.au", name: "Tiago Araujo" } },
                    { type: "mention", text: "<at>Calum Simpson</at>",  mentioned: { id: "calum@ssw.com.au", name: "Calum Simpson" } }
                  ]
                }
              }
            }]
          }' | curl -sS -X POST "$TEAMS_WEBHOOK_URL" -H "Content-Type: application/json" -d @-
